
name: Music Store Price Tracker

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      test_reason:
        description: 'Reason for manual test (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # დამატებულია playwright-stealth ბლოკირებების ასარიდებლად
          pip install pandas openpyxl requests beautifulsoup4 gspread oauth2client playwright playwright-stealth pytz
          playwright install chromium
          playwright install-deps chromium

      - name: Create credentials.json from Secret
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Run Scraper
        env:
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          PYTHONUNBUFFERED: "1"
        run: |
          # უზრუნველყოფს, რომ ბრაუზერი გაეშვას headless რეჟიმში GitHub-ზე
          sed -i 's/headless=False/headless=True/g' get_links.py || true
          sed -i 's/headless=False/headless=True/g' geovoice_get_links.py || true
          
          # მთავარი სკრიპტის გაშვება
          python master_app.py
        continue-on-error: true

      - name: Upload logs as artifact (always)
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: automation-logs
          path: |
            automation.log
            *.log
            archive/