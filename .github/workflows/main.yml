name: Music Store Price Tracker

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests beautifulsoup4 gspread oauth2client playwright pytz
          playwright install chromium
          playwright install-deps chromium

      - name: Create credentials.json from Secret
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Run Scraper
        env:
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          PYTHONUNBUFFERED: "1"
        run: |
          # უსაფრთხოების ჩანაცვლება
          sed -i 's/headless=False/headless=True/g' get_links.py
          sed -i 's/headless=False/headless=True/g' geovoice_get_links.py
          
          # გაშვება
          python master_app.py