name: Music Store Price Tracker

on:
  schedule:
    # გაეშვება ყოველ დღე თბილისის დროით 17:00-ზე (UTC 13:00)
    - cron: '0 13 * * *'
  workflow_dispatch: # ხელით გაშვების ღილაკი

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl requests beautifulsoup4 gspread oauth2client playwright pytz
        playwright install chromium

    - name: Create credentials.json from Secret
      run: |
        echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

    - name: Run Scraper
      run: python master_app.py